# Local AI model server for the chatbot harness.
#
# This container is intentionally isolated:
# - Bound only to 127.0.0.1 (host-loopback)
# - No privileged mode
# - No Docker socket mount
# - No AWS / SSH / home directory mounts
# - Model files mounted read-only only

version: "3.8"

services:
  model-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: local_ai_model
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /Users/shinseong/Desktop/ai-models:/models:ro
    command: >
      -m /models/Korean-Gemma-2B-Instruct.Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080