AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless API for the AWS portfolio site.

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 3

Resources:
  ChatRequestTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: chat-requests
      AttributeDefinitions:
        - AttributeName: requestId
          AttributeType: S
      KeySchema:
        - AttributeName: requestId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ChatQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: chat-jobs
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600

  LocalAiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../local_ai/harness/
      Handler: harness.app.lambda_handler
      Runtime: python3.12
      Architectures:
        - x86_64
      Timeout: 30
      Environment:
        Variables:
          CHAT_REQUEST_TABLE: !Ref ChatRequestTable
          CHAT_QUEUE_URL: !GetAtt ChatQueue.QueueUrl
          CHAT_TTL_SECONDS: 3600
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource: !GetAtt ChatRequestTable.Arn
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt ChatQueue.Arn
      Events:
        ChatPost:
          Type: Api
          Properties:
            Path: /chat
            Method: post
        ChatOptions:
          Type: Api
          Properties:
            Path: /chat
            Method: options
        ChatGet:
          Type: Api
          Properties:
            Path: /chat/{requestId}
            Method: get
        ChatGetOptions:
          Type: Api
          Properties:
            Path: /chat/{requestId}
            Method: options

  PortfolioApiFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: hello_world/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - x86_64
      Events:
        Health:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: /health
            Method: get
        Profile:
          Type: Api
          Properties:
            Path: /profile
            Method: get
        HealthOptions:
          Type: Api
          Properties:
            Path: /health
            Method: options
        ProfileOptions:
          Type: Api
          Properties:
            Path: /profile
            Method: options

Outputs:
  # ServerlessRestApi is an implicit API created out of Events key under Serverless::Function
  # Find out more about other implicit resources you can reference within SAM
  # https://github.com/awslabs/serverless-application-model/blob/master/docs/internals/generated_resources.rst#api
  PortfolioApiBaseUrl:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod"
  PortfolioApiFunction:
    Description: "Portfolio API Lambda Function ARN"
    Value: !GetAtt PortfolioApiFunction.Arn
  PortfolioApiFunctionIamRole:
    Description: "Implicit IAM Role created for the Portfolio API function"
    Value: !GetAtt PortfolioApiFunctionRole.Arn
  LocalAiFunction:
    Description: "Local AI Chatbot Lambda Function ARN"
    Value: !GetAtt LocalAiFunction.Arn
  LocalAiFunctionIamRole:
    Description: "Implicit IAM Role created for the Local AI function"
    Value: !GetAtt LocalAiFunctionRole.Arn
